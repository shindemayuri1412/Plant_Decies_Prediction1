<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🌾 Smart Agriculture | Login</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body class="loginForm">

    <nav class="navbar">
        <div class="logo">🌾 AgroVision AI</div>
        <div class="menu">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="signup.html">Signup</a>
            <a href="feedback.html">Feedback</a>
        </div>
    </nav>
    <div class="login">
    <div class="box">
        <h1>welcome Back</h1>
        <h3>Login to access your smart dashboard</h3>

        <form id="loginForm">
            <input type="text" id="username" placeholder="Enter Username">
            <input type="password" id="password" placeholder="Enter Password">
            <button type="submit">Login</button>
        </form>

        <p id="message"></p>
    </div></div>

    <script>
        let attempts = 3;
        const correctUser = "admin";
        const correctPass = "12345";

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();

            let user = document.getElementById("username").value.trim();
            let pass = document.getElementById("password").value.trim();
            let msg = document.getElementById("message");

            if (user === "" || pass === "") {
                msg.style.color = "red";
                msg.innerText = "Please enter both username and password!";
                return;
            }

            if (user === correctUser && pass === correctPass) {
                msg.style.color = "green";
                msg.innerText = "Login Successful! Redirecting...";

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1200);
            } else {
                attempts--;
                msg.style.color = "red";
                msg.innerText = `Invalid credentials! Attempts left: ${attempts}`;
            }

            if (attempts === 0) {
                msg.innerText = "You have used all attempts! Login disabled.";
                document.querySelector("button").disabled = true;
                document.querySelector("button").style.opacity = "0.5";
            }
        });
    </script>

</body>
</html>
