<!DOCTYPE html>
<html>
<head>
    <title>Crop Disease Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="disease.css">
</head>
<body>

<!-- ===== NAVIGATION BAR ===== -->
<nav class="navbar navbar-expand-lg navbar-dark shadow">
  <div class="container">

    <a class="navbar-brand fw-bold text-warning" href="index.html">
      🌾 Smart Agriculture
    </a>

    <button class="navbar-toggler" type="button" 
            data-bs-toggle="collapse" 
            data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="about.html">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="feedback.html">Feedback</a>
        </li>
      </ul>
    </div>

  </div>
</nav>
<!-- ===== END NAVBAR ===== -->

<!-- ===== MAIN CONTENT ===== -->
<div class="container py-4">

    <h2 class="text-center text-warning fw-bold mb-3">
        🌿 Crop Disease Status Prediction
    </h2>

    <div class="card p-3 shadow prediction-card mb-3">

        <form id="diseaseForm">

            <div class="mb-2">
                <label class="form-label fw-semibold">Crop Type</label>
                <select class="form-select" id="cropType" required>
                    <option selected disabled>Select Crop</option>
                    <option>Rice</option>
                    <option>Wheat</option>
                    <option>Maize</option>
                    <option>Cotton</option>
                    <option>Sugarcane</option>
                </select>
            </div>

            <div class="mb-2">
                <label class="form-label fw-semibold">Soil Type</label>
                <select class="form-select" id="soilType" required>
                    <option selected disabled>Select Soil</option>
                    <option>Loamy</option>
                    <option>Clay</option>
                    <option>Sandy</option>
                    <option>Silty</option>
                    <option>Peaty</option>
                </select>
            </div>

            <div class="mb-2">
                <label class="form-label fw-semibold">Temperature (°C)</label>
                <input type="number" class="form-control" id="temperature" placeholder="Enter temperature" required>
            </div>

            <div class="mb-2">
                <label class="form-label fw-semibold">Humidity (%)</label>
                <input type="number" class="form-control" id="humidity" placeholder="Enter humidity" required>
            </div>

            <div class="mb-2">
                <label class="form-label fw-semibold">Soil Moisture (%)</label>
                <input type="number" class="form-control" id="soilMoisture" placeholder="Enter soil moisture" required>
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold mt-2">
                Predict Disease Status
            </button>

        </form>

    </div>

    <!-- Result Section -->
<!-- Result Section -->
<div class="result-card text-center p-3" id="resultCard">
    <h4 class="fw-bold mb-2">🦠 Disease Detection</h4>
    <p class="status-text mb-1" id="statusText"></p>
    <p class="confidence-text" id="confidenceText"></p>
</div>



</div>

<!-- ===== END MAIN CONTENT ===== -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS for form handling -->
<script>
document.getElementById('diseaseForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // Get values
    const crop = document.getElementById('cropType').value;
    const soil = document.getElementById('soilType').value;
    const temp = document.getElementById('temperature').value;
    const hum = document.getElementById('humidity').value;
    const moisture = document.getElementById('soilMoisture').value;

    // Simple validation for numbers
    if (isNaN(temp) || isNaN(hum) || isNaN(moisture) || temp==="" || hum==="" || moisture==="") {
        alert('⚠️ Please enter valid numbers for Temperature, Humidity, and Soil Moisture!');
        return;
    }

    // Demo prediction (replace with your ML model later)
    const isHealthy = Math.random() > 0.5;
    const diseaseName = "Leaf Rust";
    const confidence = Math.floor(Math.random() * 21) + 80; // Random 80-100%

    // Update result block
    const statusText = document.getElementById('statusText');
    const confidenceText = document.getElementById('confidenceText');

    if (isHealthy) {
        statusText.innerHTML = "Healthy Crop ✅";
        statusText.style.color = "#2e7d32"; // green
    } else {
        statusText.innerHTML = `Disease Detected: ${diseaseName} ⚠️`;
        statusText.style.color = "#c62828"; // red
    }

    confidenceText.innerHTML = `Confidence: ${confidence}%`;
});

</script>

</body>
</html>
